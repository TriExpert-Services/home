name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys in parallel.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Pulls secrets from the `DEPLOY` environment so we can add
    # required-reviewers / branch protection later without changing
    # the workflow.
    environment: DEPLOY
    steps:
      - name: Load SSH key into agent
        # webfactory/ssh-agent handles multi-line PEM keys correctly
        # (writing the secret to a file and feeding it to ssh -i was
        # tripping `error in libcrypto` whenever GitHub's UI normalised
        # the key's newlines).
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust Hetzner host key
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -t ed25519,rsa,ecdsa "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Trigger deploy
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          PROXMOX_HOST: ${{ secrets.PROXMOX_HOST }}
          LXC_ID: ${{ secrets.LXC_ID }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              -J "root@${HETZNER_HOST}" \
              "root@${PROXMOX_HOST}" \
              "pct exec ${LXC_ID} -- /usr/local/bin/triexpert-deploy"
