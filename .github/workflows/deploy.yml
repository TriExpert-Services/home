name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys in parallel.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Pulls secrets from the `DEPLOY` environment so we can add
    # required-reviewers / branch protection later without changing
    # the workflow.
    environment: DEPLOY
    steps:
      - name: Load SSH key into agent
        # The DEPLOY_SSH_KEY secret holds the OpenSSH PEM body
        # encoded as a single-line base64 string. Multi-line secrets
        # got their newlines mangled by the GitHub UI when pasted
        # (libcrypto couldn't parse the resulting body). Encoding to
        # base64 and decoding here sidesteps every newline-handling
        # corner case.
        env:
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Verify the key parses before continuing — fail fast if not.
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Trust Hetzner host key
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -t ed25519,rsa,ecdsa "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Trigger deploy
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          PROXMOX_HOST: ${{ secrets.PROXMOX_HOST }}
          LXC_ID: ${{ secrets.LXC_ID }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              -J "root@${HETZNER_HOST}" \
              "root@${PROXMOX_HOST}" \
              "pct exec ${LXC_ID} -- /usr/local/bin/triexpert-deploy"
