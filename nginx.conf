events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version in Server header / error pages
    server_tokens off;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    sendfile        on;
    keepalive_timeout  65;

    # ---- CORS allowlist ----
    # Only the production frontend domains are allowed; everything else
    # gets no Access-Control-Allow-Origin (browsers will reject the call).
    map $http_origin $cors_allow_origin {
        default                                  "";
        "https://triexpertservice.com"           $http_origin;
        "https://www.triexpertservice.com"       $http_origin;
        "https://staging.triexpertservice.com"   $http_origin;
    }

    # ---- Security headers ----
    # CSP — explicit allowlist for the third parties this app actually talks to.
    # 'unsafe-inline' is kept for style-src only (Tailwind/utility libs need it
    # for runtime injected styles). script-src is strict 'self' — no inline JS,
    # no eval. connect-src lists Supabase + the n8n webhook hosts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://app.n8n-tech.cloud wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server {
        listen       80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Static assets — long cache, allowlisted CORS only when needed
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin $cors_allow_origin always;
            add_header Vary "Origin" always;
        }

        # SPA — same-origin only
        location / {
            try_files $uri $uri/ @fallback;

            add_header Access-Control-Allow-Origin $cors_allow_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Vary "Origin" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        location @fallback {
            rewrite ^.*$ /index.html last;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
