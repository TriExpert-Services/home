name: triexpert-home

services:
  web:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_N8N_WEBHOOK_URL: ${VITE_N8N_WEBHOOK_URL}
        VITE_N8N_CONTACT_WEBHOOK_URL: ${VITE_N8N_CONTACT_WEBHOOK_URL}
    image: triexpert-home-web:latest
    container_name: triexpert-home
    ports:
      - "${HOST_PORT:-80}:${CONTAINER_PORT:-80}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/health.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
